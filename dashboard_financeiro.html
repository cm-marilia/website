<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #meuGrafico { width: 100%; height: 600px; }
    </style>
</head>
<body>

    <div id="meuGrafico"></div>

    <script>
        // MÁGICA 1: Adicionamos um código de tempo no final da URL para quebrar o cache do Google Sheets.
        // Assim, toda vez que a página abre, ele puxa a versão mais atualizada na hora!
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSeiEl6tsmsHfu5qECIgTNFJtSLOHJWPUD334BxUtITfI-YKaWwH-vvVM5IBTO5WDypR_r3p_AjcxZL/pub?output=csv&t=' + new Date().getTime();

        const formatarMoeda = (valor) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        };

        const limparNumeroBR = (valor) => {
            if (!valor) return 0;
            if (typeof valor === 'number') return valor;
            let textoLimpo = String(valor).replace(/[^\d,-]/g, '');
            return parseFloat(textoLimpo.replace(',', '.')) || 0;
        };

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true, // Ignora automaticamente as linhas vazias no final da planilha
            complete: function(results) {
                
                // MÁGICA 2: Pega os cabeçalhos que vieram do Google Sheets e força a limpeza.
                // Não importa se veio "Mês", "mes " ou "Mes", ele converte tudo certinho para o código ler.
                const dadosLimpos = results.data.map(linha => {
                    let linhaLimpa = {};
                    for (let chave in linha) {
                        if (chave) {
                            let chaveLimpa = chave.normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().toLowerCase();
                            linhaLimpa[chaveLimpa] = linha[chave];
                        }
                    }
                    return linhaLimpa;
                });

                // Filtra para garantir que só linhas com dados passem
                const dados = dadosLimpos.filter(linha => linha['mes'] && linha['ano']);

                // Monta os dados do gráfico buscando sempre pelas chaves convertidas em minúsculo
                const eixoX = dados.map(linha => linha['mes'].toUpperCase() + '/' + linha['ano']);
                const serieDuodecimo = dados.map(linha => limparNumeroBR(linha['duodecimo']));
                const serieEmpenhado = dados.map(linha => limparNumeroBR(linha['empenhado']));
                const serieLiquidado = dados.map(linha => limparNumeroBR(linha['liquidado'])); 
                const seriePago = dados.map(linha => limparNumeroBR(linha['pago']));
                const serieResultado = dados.map(linha => limparNumeroBR(linha['resultado']));

                const myChart = echarts.init(document.getElementById('meuGrafico'));
                
                const option = {
                    title: {
                        text: 'Acompanhamento Orçamentário',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'axis',
                        valueFormatter: (value) => formatarMoeda(value)
                    },
                    legend: {
                        data: ['Duodécimo', 'Empenhado', 'Liquidado', 'Pago', 'Resultado'],
                        bottom: 0
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '10%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: eixoX,
                        axisLabel: { rotate: 45 }
                    },
                    yAxis: {
                        type: 'value',
                        axisLabel: {
                            formatter: (value) => {
                                if (value >= 1000000) return (value / 1000000) + 'M';
                                if (value >= 1000) return (value / 1000) + 'k';
                                return value;
                            }
                        }
                    },
                    series: [
                        {
                            name: 'Duodécimo',
                            type: 'line',
                            smooth: true,
                            data: serieDuodecimo,
                            itemStyle: { color: '#000000' } 
                        },
                        {
                            name: 'Empenhado',
                            type: 'bar',
                            data: serieEmpenhado,
                            itemStyle: { color: '#5470C6' } 
                        },
                        {
                            name: 'Liquidado',
                            type: 'bar',
                            data: serieLiquidado,
                            itemStyle: { color: '#91CC75' } 
                        },
                        {
                            name: 'Pago',
                            type: 'bar',
                            data: seriePago,
                            itemStyle: { color: '#FAC858' } 
                        },
                        {
                            name: 'Resultado',
                            type: 'line',
                            smooth: true,
                            data: serieResultado,
                            itemStyle: { color: '#EE6666' } 
                        }
                    ]
                };

                myChart.setOption(option);

                window.addEventListener('resize', function() {
                    myChart.resize();
                });
            }
        });
    </script>
</body>
</html>
